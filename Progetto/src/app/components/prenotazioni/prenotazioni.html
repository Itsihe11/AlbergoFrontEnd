<section class="booking-page">
    <h1>Prenota</h1>

    <div class="form-group">
        <label for="tipoPrenotazione">Tipo Prenotazione:</label>
        <select id="tipoPrenotazione" [(ngModel)]="tipoPrenotazione" name="tipoPrenotazione" class="form-select">
            <option value="ALBERGO">Albergo</option>
            <option value="SPA">SPA</option>
        </select>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label>Check-in / Data Prenotazione</label>
            <input class="form-input" type="date" [(ngModel)]="checkIn" [ngModelOptions]="{standalone: true}" (change)="onDateChange()">
        </div>

        <div class="form-group">
            <label>Check-out</label>
            <input class="form-input" type="date" [(ngModel)]="checkOut" [ngModelOptions]="{standalone: true}" (change)="onDateChange()">
        </div>
    </div>

    <p class="nights-count">Notti: {{ numeroNotti() }}</p>

    @if (includeAlbergo()) {
    <div class="form-group">
        <label>Tipo camera</label>
        <select class="form-select" [(ngModel)]="tipoCamera" [ngModelOptions]="{standalone: true}"
            (ngModelChange)="onTipoCameraChange($event)">
            <option value="" disabled selected>Seleziona un tipo di camera</option>
            @for (tipo of tipiCamera; track $index) {
            <option [value]="getValoreTipoCamera(tipo)">
                {{ getValoreTipoCamera(tipo) }}
            </option>
            }
        </select>
    </div>

    <div class="form-group">
        <label>Numero Stanza</label>
        <select class="form-select" [(ngModel)]="stanzaSelezionata" [ngModelOptions]="{standalone: true}">
            <option value="" disabled selected>Seleziona una stanza...</option>
            @for (stanza of stanzeFiltrate; track $index) {
            <option [value]="getStanzaId(stanza)">
                Stanza {{ getStanzaNumero(stanza) }}
            </option>
            }
        </select>
    </div>

    <div class="form-group">
        <label>Pensione</label>
        <select class="form-select" [(ngModel)]="pensione" [ngModelOptions]="{standalone: true}">
            @for (p of listaPensioni; track $index) {
            <option [value]="p.tipo">
                {{ p.nome || p.tipo }} (+{{ p.prezzo }} €/giorno)
            </option>
            }
        </select>
    </div>
    }

    <div class="servizi-container">
        <label class="section-title">Servizi Aggiuntivi</label>

        <div class="servizi-grid">
            <div *ngFor="let s of listaServizi" class="servizio-card">
                <label class="servizio-label">
                    <input
                        class="servizio-checkbox"
                        type="checkbox"
                        [checked]="isServizioSelezionato(s.idservizio || s.id)"
                        (change)="toggleServizio(s.idservizio || s.id)"
                    />
                    <span class="servizio-nome">{{ s.nomeservizio }}</span>
                    <span class="servizio-prezzo">+{{ s.prezzo || s.prezzi }} €</span>
                </label>
            </div>
        </div>
    </div>

    <h2 class="section-title">Ospiti</h2>
    @for (ospite of ospiti; track $index) {
    <div class="guest-row">
        <input class="form-input" type="text" placeholder="Nome" [(ngModel)]="ospite.nome" [ngModelOptions]="{standalone: true}">
        <input class="form-input" type="text" placeholder="Cognome" [(ngModel)]="ospite.cognome" [ngModelOptions]="{standalone: true}">
        <input class="form-input" type="date" [(ngModel)]="ospite.dataNascita" [ngModelOptions]="{standalone: true}">
        <button class="btn-remove" type="button" (click)="rimuoviOspite($index)">Rimuovi</button>
    </div>
    }
    <button class="btn-secondary" type="button" (click)="aggiungiOspite()">+ Aggiungi ospite</button>

    <div class="form-group">
        <label>Metodo di pagamento</label>
        <select class="form-select" [(ngModel)]="metodoPagamento" [ngModelOptions]="{standalone: true}">
            <option value="CARTA">Carta</option>
            <option value="BONIFICO">Bonifico</option>
        </select>
    </div>

    <div class="price-summary">
        <p>Prezzo totale: <strong>{{ prezzoTotale() }} €</strong></p>
        <p>Caparra richiesta (10%): <strong>{{ caparra() }} €</strong></p>
    </div>

    <!-- 🟢 IMPORTANTE: type="button" impedisce il reload del form -->
    <button class="btn-primary" type="button" (click)="prenota()">Conferma prenotazione</button>

    @if (messaggio) {
    <p class="feedback success">{{ messaggio }}</p>
    }
    @if (errore) {
    <p class="feedback error">{{ errore }}</p>
    }
</section>
