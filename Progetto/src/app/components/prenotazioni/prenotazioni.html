<section class="booking-page">
    <h1>Prenota</h1>

    <div class="form-group">
        <label>Cosa vuoi prenotare?</label>
        <div class="form-group">
            <label for="tipoPrenotazione">Tipo Prenotazione:</label>
            <select id="tipoPrenotazione" [(ngModel)]="tipoPrenotazione" name="tipoPrenotazione" class="form-control">
                <option value="ALBERGO">Albergo</option>
                <option value="SPA">SPA</option>
            </select>
        </div>
    </div>

    <div>
        <label>Check-in / Data Prenotazione</label>
        <input type="date" [(ngModel)]="checkIn" [ngModelOptions]="{standalone: true}" (change)="onDateChange()">
    </div>

    <div>
        <label>Check-out</label>
        <input type="date" [(ngModel)]="checkOut" [ngModelOptions]="{standalone: true}" (change)="onDateChange()">
    </div>

    <p>Notti: {{ numeroNotti() }}</p>

    @if (includeAlbergo()) {
    <div>
        <label>Tipo camera</label>
        <select [(ngModel)]="tipoCamera" [ngModelOptions]="{standalone: true}"
            (ngModelChange)="onTipoCameraChange($event)">
            <option value="" disabled selected>Seleziona un tipo di camera</option>
            @for (tipo of tipiCamera; track $index) {
            <option [value]="getValoreTipoCamera(tipo)">
                {{ getValoreTipoCamera(tipo) }}
            </option>
            }
        </select>
    </div>

    <div class="form-group">
        <label>Numero Stanza</label>
        <select [(ngModel)]="stanzaSelezionata" [ngModelOptions]="{standalone: true}">
            <option value="" disabled selected>Seleziona una stanza...</option>
            @for (stanza of stanzeFiltrate; track $index) {
            <option [value]="getStanzaId(stanza)">
                Stanza {{ getStanzaNumero(stanza) }}
            </option>
            }
        </select>
    </div>

    <div class="form-group">
        <label>Pensione</label>
        <select [(ngModel)]="pensione" [ngModelOptions]="{standalone: true}">
            @for (p of listaPensioni; track $index) {
            <option [value]="p.tipo">
                {{ p.nome || p.tipo }} (+{{ p.prezzo }} €/giorno)
            </option>
            }
        </select>
    </div>
    }

    <div class="servizi-container my-3">
        <label class="fw-bold d-block mb-2">Servizi Aggiuntivi:</label>

        <div class="servizi-grid">
            <div *ngFor="let s of listaServizi" class="servizio-card">
                <label class="servizio-label">
                    <input type="checkbox" [checked]="isServizioSelezionato(getServizioId(s))"
                        (change)="toggleServizio(getServizioId(s))" />
                    <span class="servizio-nome">{{ getServizioNome(s) }}</span>
                    <span class="servizio-prezzo">+{{ getServizioPrezzo(s) }} €</span>
                </label>
            </div>
        </div>
    </div>

    <h2>Ospiti</h2>
    @for (ospite of ospiti; track $index) {
    <div>
        <input type="text" placeholder="Nome" [(ngModel)]="ospite.nome" [ngModelOptions]="{standalone: true}">
        <input type="text" placeholder="Cognome" [(ngModel)]="ospite.cognome" [ngModelOptions]="{standalone: true}">
        <input type="date" [(ngModel)]="ospite.dataNascita" [ngModelOptions]="{standalone: true}">
        <button type="button" (click)="rimuoviOspite($index)">Rimuovi</button>
    </div>
    }
    <button type="button" (click)="aggiungiOspite()">+ Aggiungi ospite</button>

    <div class="form-group">
        <label>Metodo di pagamento</label>
        <select [(ngModel)]="metodoPagamento" [ngModelOptions]="{standalone: true}">
            <option value="CARTA">Carta</option>
            <option value="BONIFICO">Bonifico</option>
        </select>
    </div>

    <div>
        <p>Prezzo totale: {{ prezzoTotale() }} €</p>
        <p>Caparra richiesta (10%): {{ caparra() }} €</p>
    </div>

    <!-- 🟢 IMPORTANTE: type="button" impedisce il reload del form -->
    <button type="button" (click)="prenota()">Conferma prenotazione</button>

    @if (messaggio) {
    <p class="feedback success">{{ messaggio }}</p>
    }
    @if (errore) {
    <p class="feedback error">{{ errore }}</p>
    }
</section>
