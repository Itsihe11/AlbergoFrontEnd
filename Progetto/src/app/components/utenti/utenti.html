<section class="login-page">
  <div class="login-wrapper">
    <div class="login-container">
      <div class="login-box">
        <h2 class="login-title">Accedi al Portale</h2>

        <div class="form-group">
          <label>Indirizzo Email</label>
          <input class="form-input" type="text" [(ngModel)]="email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input class="form-input" type="password" [(ngModel)]="password">
        </div>

        <button class="btn-primary" (click)="login()">Accedi</button>

        @if (errore) {
          <div class="error-msg">{{ errore }}</div>
        }
      </div>
    </div>
  </div>
</section>
